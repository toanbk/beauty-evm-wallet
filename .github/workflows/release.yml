name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: beauty-wallet-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: beauty-wallet-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: beauty-wallet-darwin-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/beauty-wallet ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            beauty-wallet-linux-x86_64/beauty-wallet-linux-x86_64
            beauty-wallet-darwin-x86_64/beauty-wallet-darwin-x86_64
            beauty-wallet-darwin-aarch64/beauty-wallet-darwin-aarch64
          generate_release_notes: true
